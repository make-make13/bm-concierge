# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy for BM-concierge at ai.4-am.ru
# Place in /etc/nginx/sites-available/ai.4-am.ru
# Enable: sudo ln -s /etc/nginx/sites-available/ai.4-am.ru /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d ai.4-am.ru
# ─────────────────────────────────────────────────────────────────────────────

upstream bm_concierge {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name ai.4-am.ru;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name ai.4-am.ru;

    # SSL (managed by Certbot — paths added automatically)
    # ssl_certificate     /etc/letsencrypt/live/ai.4-am.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ai.4-am.ru/privkey.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin" always;

    # Logging
    access_log /var/log/nginx/ai.4-am.ru.access.log;
    error_log  /var/log/nginx/ai.4-am.ru.error.log warn;

    # ── Widget (public JS) ───────────────────────────────────────────────────
    location = /widget.js {
        proxy_pass         http://bm_concierge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache widget in browser for 5 min (short, so updates propagate quickly)
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=300";
    }

    # ── WebChat API (public) ─────────────────────────────────────────────────
    location /api/chat/ {
        proxy_pass         http://bm_concierge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Limit request body (chat messages)
        client_max_body_size 1m;
    }

    # ── VK Webhook (public, VK posts here) ──────────────────────────────────
    location /webhooks/vk {
        proxy_pass         http://bm_concierge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 2m;
    }

    # ── Telegram Webhook (public, Telegram posts here) ───────────────────────
    location /webhooks/telegram {
        proxy_pass         http://bm_concierge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 2m;
    }

    # ── Console & Operator API (access-controlled in app layer) ─────────────
    # Consider restricting to VPN/office IP in nginx for extra security:
    # allow 1.2.3.4;
    # deny all;
    location /console {
        proxy_pass         http://bm_concierge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass cookies for Console session auth
        proxy_set_header   Cookie            $http_cookie;
    }

    # ── All other routes (health, API, etc.) ────────────────────────────────
    location / {
        proxy_pass         http://bm_concierge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 10m;
    }

    # ── Block hidden files ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
