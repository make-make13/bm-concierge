<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход — БМ Консьерж</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg: #080a10;
      --panel: #121722;
      --border: rgba(255,255,255,.08);
      --text: #f3f5f7;
      --muted: #8f9bad;
      --accent: #7c8cff;
      --danger: #ff5c7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 360px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo svg {
      width: 40px; height: 40px;
      fill: var(--accent);
    }
    .login-title {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }
    .form-group {
      margin-top: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      margin-top: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { opacity: .9; }
    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z"/></svg>
      <div class="login-title">БМ Консьерж</div>
      <div class="login-sub">Панель управления БМ Консьерж</div>
    </div>
    <div class="form-group">
      <label>Токен доступа</label>
      <input type="password" id="token-input" placeholder="Введите токен..." autocomplete="current-password">
    </div>
    <button class="btn" onclick="doLogin()">Войти</button>
    <div class="error" id="error-msg">Неверный токен</div>
  </div>
  <script>
    document.getElementById('token-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const token = document.getElementById('token-input').value.trim();
      if (!token) return;

      const res = await fetch('/api/console/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });

      if (res.ok) {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('next') || '/console';
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('token-input').value = '';
        document.getElementById('token-input').focus();
      }
    }
  </script>
</body>
</html>
